name: Run Tests

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  RENV_PATHS_ROOT: ~/.cache/R/renv

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libwebp-dev \
            libglpk-dev \
            libzmq3-dev \
            build-essential \
            libx11-dev \
            pandoc

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.2"
          use-public-rspm: true

      - name: Set up renv
        uses: r-lib/actions/setup-renv@v2

      - name: Ensure testthat is available
        shell: Rscript {0}
        run: |
          if (!requireNamespace("testthat", quietly = TRUE)) {
            install.packages("testthat")
          }

      - name: Run testthat tests
        shell: Rscript {0}
        run: |
          testthat::test_dir('scripts/tests/testthat', stop_on_failure = TRUE)

      - name: Check 100% test coverage
        shell: Rscript {0}
        run: |
          if (!requireNamespace("covr", quietly = TRUE)) install.packages("covr")
          source_files <- list.files("scripts/functions", pattern = "\\.R$", full.names = TRUE)
          test_files   <- list.files("scripts/tests/testthat", pattern = "^test-.*\\.R$", full.names = TRUE)
          cov <- covr::file_coverage(source_files, test_files)
          pct <- covr::percent_coverage(cov)
          message(sprintf("Coverage: %.1f%%", pct))
          if (pct < 100) stop(sprintf("Coverage is %.1f%% — must be 100%%", pct))
