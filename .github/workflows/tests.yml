name: Run Tests

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.2"
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libwebp-dev \
            libglpk-dev \
            libzmq3-dev \
            build-essential

      - name: Install renv
        run: Rscript -e "install.packages('renv', repos = 'https://cloud.r-project.org')"

      - name: Run testthat tests
        run: Rscript -e "renv::restore(prompt = FALSE); testthat::test_dir('tests/testthat', stop_on_failure = TRUE)"
